<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shining Moments</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #deeeff;
  --text: #4a6880;
  --text-light: #8aaec8;
  --accent: #a8c8e8;
  --border: rgba(180,210,240,0.55);
  --glass: rgba(255,255,255,0.62);
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: linear-gradient(155deg,#d8edff 0%,#eaf4ff 45%,#f2eeff 100%);
  min-height:100vh;
  font-family:'Space Mono',monospace;
  color:var(--text);
  display:flex; flex-direction:column; align-items:center;
  overflow-x:hidden;
}
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(circle at 15% 25%, rgba(180,220,255,0.28) 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, rgba(200,185,255,0.18) 0%, transparent 50%);
}

.app {
  position:relative; z-index:1;
  width:100%; max-width:480px;
  padding:12px 14px 60px;
  display:flex; flex-direction:column; align-items:center; gap:12px;
}

/* ── HEADER ── */
.header { width:100%; text-align:center; padding:6px 0 0; }
.logo-img {
  width:78%; max-width:300px; height:auto;
  filter:drop-shadow(0 2px 14px rgba(100,160,220,0.45));
}

/* ── SCREENS ── */
.screen { display:none; width:100%; flex-direction:column; align-items:center; gap:11px; }
.screen.active { display:flex; }

/* ── GLASS ── */
.glass {
  background:var(--glass); backdrop-filter:blur(16px);
  border:1px solid rgba(200,225,245,0.8); border-radius:18px;
  box-shadow:0 4px 22px rgba(140,190,230,0.13), inset 0 1px 0 rgba(255,255,255,0.82);
}

/* ── CAMERA ── */
.camera-wrapper {
  position:relative; width:100%; aspect-ratio:540/400;
  border-radius:16px; overflow:hidden; background:#c0d8f0;
  box-shadow:0 0 0 1.5px rgba(160,200,230,0.5), 0 8px 28px rgba(120,180,220,0.18);
}
#video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); transition:filter .3s; }

.filter-layer { position:absolute; inset:0; pointer-events:none; }
#filterOverlay.on {
  background:
    radial-gradient(ellipse at 50% 35%, rgba(255,255,245,0.1) 0%, transparent 65%),
    linear-gradient(180deg, rgba(0,0,10,0.18) 0%, transparent 35%, rgba(0,0,10,0.38) 100%);
}
#grainOverlay.on {
  opacity:0.2;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:140px; mix-blend-mode:overlay;
}
#vignetteOverlay.on {
  background:radial-gradient(ellipse at 50% 42%, transparent 30%, rgba(0,0,15,0.68) 100%);
}

.ts-overlay {
  position:absolute; bottom:8px; left:10px;
  font-size:0.52rem; color:rgba(255,210,160,0.88);
  letter-spacing:1px; pointer-events:none;
  opacity:0; transition:opacity .3s;
}
.ts-overlay.on { opacity:1; }

.rec-dot {
  position:absolute; top:10px; right:10px;
  width:8px; height:8px; border-radius:50%;
  background:#ff4455; box-shadow:0 0 7px #ff4455;
  animation:blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

/* countdown */
.cd-overlay {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(0,5,20,0.22); backdrop-filter:blur(2px);
  z-index:10; opacity:0; pointer-events:none; transition:opacity .2s;
}
.cd-overlay.visible { opacity:1; pointer-events:auto; }
.cd-num {
  font-family:'Cormorant Garamond',serif; font-style:italic;
  font-size:7.5rem; color:#fff; line-height:1;
  text-shadow:0 0 20px rgba(180,220,255,0.9), 0 0 55px rgba(140,200,255,0.6);
  animation:cPulse 1s ease-out;
}
@keyframes cPulse {
  0%{transform:scale(1.5);opacity:0} 20%{opacity:1} 80%{transform:scale(1)} 100%{transform:scale(.86);opacity:.5}
}
.guide-txt {
  margin-top:10px; font-size:.78rem; color:#c8eeff;
  letter-spacing:3px; text-transform:uppercase;
  text-shadow:0 0 10px rgba(160,220,255,.9);
  animation:fadeUp .4s ease-out;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

/* flash */
#flashScreen {
  position:fixed; inset:0; background:#fff;
  z-index:9999; opacity:0; pointer-events:none; transition:opacity .05s;
}
#flashScreen.flash { opacity:1; }

/* ── PROGRESS ── */
.progress-row { display:flex; gap:8px; align-items:center; justify-content:center; }
.pdot {
  width:28px; height:28px; border-radius:50%;
  border:1.5px solid rgba(160,200,230,0.45);
  background:rgba(255,255,255,0.5);
  display:flex; align-items:center; justify-content:center;
  font-size:.52rem; color:var(--text-light); transition:all .35s;
}
.pdot.done { border-color:#7ac8f0; }
.pdot.done::after { content:'✓'; color:#5ab0e0; font-size:.68rem; }
.pdot.done span { display:none; }
.pdot.active {
  border-color:#a0d8f8;
  box-shadow:0 0 14px rgba(160,216,248,.6), inset 0 0 6px rgba(160,216,248,.18);
  animation:dotP .9s infinite;
}
.pdot.active::after { content:'●'; color:#80c8f0; font-size:.52rem; }
.pdot.active span { display:none; }
@keyframes dotP { 0%,100%{box-shadow:0 0 10px rgba(160,216,248,.45)} 50%{box-shadow:0 0 22px rgba(160,216,248,.8)} }

/* ── THUMBS ── */
.thumb-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:5px; width:100%; }
.thumb-item {
  position:relative; aspect-ratio:540/400; border-radius:7px; overflow:hidden;
  border:1px solid rgba(160,200,230,0.38); background:rgba(210,230,245,0.45);
  cursor:pointer; transition:all .25s;
}
.thumb-item img { width:100%; height:100%; object-fit:cover; }
.thumb-empty { display:flex; align-items:center; justify-content:center; color:rgba(150,190,220,.45); font-size:.9rem; }
.thumb-hint {
  position:absolute; inset:0; background:rgba(0,20,60,.58);
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:3px;
  opacity:0; transition:opacity .2s; font-size:.48rem; color:#a0e0ff; letter-spacing:1px;
}
.thumb-item:hover { border-color:#80c0e8; box-shadow:0 0 10px rgba(120,192,232,.38); transform:scale(1.04); }
.thumb-item:hover .thumb-hint { opacity:1; }

/* retake banner */
.retake-banner {
  background:rgba(255,200,100,0.1); border:1px solid rgba(255,190,80,.38);
  border-radius:50px; padding:6px 16px;
  font-size:.58rem; color:rgba(220,170,80,.9); letter-spacing:2px; display:none;
}
.retake-banner.visible { display:block; }

/* ── BUTTONS ── */
.controls { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; width:100%; }
.btn {
  padding:8px 16px; border-radius:50px;
  border:1.5px solid rgba(160,200,230,0.5);
  background:rgba(255,255,255,0.65); color:var(--text);
  font-family:'Space Mono',monospace; font-size:.62rem;
  letter-spacing:1px; cursor:pointer; transition:all .22s;
  backdrop-filter:blur(8px); text-transform:uppercase; white-space:nowrap;
}
.btn:hover { border-color:#90c0e0; background:rgba(255,255,255,.88); box-shadow:0 4px 14px rgba(120,190,230,.2); transform:translateY(-1px); }
.btn:active { transform:scale(.97); }
.btn-primary {
  background:linear-gradient(135deg,rgba(130,185,230,.92),rgba(150,165,220,.92));
  border-color:rgba(160,200,240,.8); color:#fff;
  box-shadow:0 4px 18px rgba(120,180,220,.32);
  padding:12px 30px; font-size:.72rem;
}
.btn-primary:hover { box-shadow:0 6px 26px rgba(120,180,220,.5); }
.btn-toggle.on { border-color:#80c0e8; color:#4090c0; background:rgba(176,218,248,.15); }
.btn-sm { padding:6px 12px; font-size:.58rem; }
.btn-icon { padding:8px 14px; }

/* ── PANEL ── */
.panel { width:100%; padding:12px 16px; display:flex; flex-direction:column; gap:9px; }
.panel-row { display:flex; align-items:center; gap:9px; }
.panel-label { font-size:.58rem; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; white-space:nowrap; }
input[type=range] {
  -webkit-appearance:none; flex:1; height:3px;
  background:linear-gradient(90deg,#90c8e8,#c0d8f0); border-radius:2px; outline:none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
  background:#fff; border:2px solid #80b8e0; cursor:pointer;
  box-shadow:0 0 5px rgba(100,180,220,.4);
}
input[type=text] {
  flex:1; padding:6px 12px; border-radius:50px;
  border:1.5px solid rgba(160,200,230,.48); background:rgba(255,255,255,.7);
  font-family:'Space Mono',monospace; font-size:.62rem; color:var(--text); outline:none;
}
input[type=text]:focus { border-color:#80c0e0; box-shadow:0 0 0 3px rgba(128,192,224,.14); }
.val-label { font-size:.58rem; color:var(--accent); min-width:26px; text-align:right; }

.divider { width:55%; height:1px; background:linear-gradient(90deg,transparent,rgba(160,200,230,.38),transparent); }
.shoot-label { font-size:.56rem; color:var(--text-light); letter-spacing:2px; text-align:center; }

/* ── STICKER PANEL ── */
.sticker-scroll {
  display:flex; gap:7px; overflow-x:auto; padding:8px 0 5px;
  scrollbar-width:thin; scrollbar-color:rgba(160,200,230,.38) transparent;
}
.sticker-scroll::-webkit-scrollbar { height:3px; }
.sticker-scroll::-webkit-scrollbar-thumb { background:rgba(160,200,230,.38); border-radius:2px; }
.sticker-btn {
  flex-shrink:0; width:58px; height:58px; border-radius:10px;
  border:1.5px solid rgba(160,200,230,.38); background:rgba(255,255,255,.7);
  overflow:hidden; cursor:pointer; transition:all .2s; padding:3px;
}
.sticker-btn img { width:100%; height:100%; object-fit:contain; }
.sticker-btn:hover { border-color:#80c0e8; transform:scale(1.08); box-shadow:0 4px 10px rgba(120,180,220,.28); }
.sticker-btn.selected { border-color:#50a0d0; box-shadow:0 0 0 2px rgba(80,160,208,.28); background:rgba(200,230,248,.3); }

/* ── RESULT ── */
.result-wrap {
  position:relative; width:100%; border-radius:18px; overflow:hidden;
  box-shadow:0 0 0 1px rgba(160,200,230,.4), 0 10px 36px rgba(120,180,220,.18);
}
#result-canvas { width:100%; height:auto; display:block; }
#sticker-canvas { position:absolute; inset:0; width:100%; height:100%; cursor:crosshair; }

/* ── SHARE SHEET ── */
.share-sheet {
  position:fixed; inset:0; z-index:200;
  display:flex; align-items:flex-end; justify-content:center;
  background:rgba(0,20,50,0.35); backdrop-filter:blur(4px);
  opacity:0; pointer-events:none; transition:opacity .25s;
}
.share-sheet.open { opacity:1; pointer-events:auto; }
.share-inner {
  width:100%; max-width:480px;
  background:rgba(245,250,255,0.97); backdrop-filter:blur(20px);
  border-radius:22px 22px 0 0;
  border-top:1px solid rgba(200,225,245,0.9);
  padding:20px 20px 36px;
  display:flex; flex-direction:column; gap:16px;
  transform:translateY(100%); transition:transform .28s cubic-bezier(.34,1.4,.64,1);
  box-shadow:0 -8px 40px rgba(120,180,220,.2);
}
.share-sheet.open .share-inner { transform:translateY(0); }
.share-title {
  text-align:center; font-size:.65rem; letter-spacing:3px;
  text-transform:uppercase; color:var(--text-light);
}
.share-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
.share-item {
  display:flex; flex-direction:column; align-items:center; gap:6px;
  cursor:pointer; padding:8px; border-radius:14px;
  transition:all .2s; border:1px solid transparent;
}
.share-item:hover { background:rgba(200,225,245,.4); border-color:var(--border); }
.share-icon {
  width:46px; height:46px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:1.4rem;
}
.share-label { font-size:.5rem; color:var(--text-light); letter-spacing:1px; text-transform:uppercase; }
.si-insta { background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.si-kakao { background:#FEE500; }
.si-link  { background:linear-gradient(135deg,#a0c8f0,#80a8e0); }
.si-save  { background:linear-gradient(135deg,#b0d8f8,#90b8e8); }
.share-close {
  text-align:center; font-size:.6rem; color:var(--text-light);
  letter-spacing:2px; cursor:pointer; padding:4px;
  text-transform:uppercase;
}

/* ── TOAST ── */
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,.92); backdrop-filter:blur(14px);
  border:1px solid rgba(160,200,230,.6); border-radius:50px;
  padding:9px 22px; font-size:.62rem; color:var(--text);
  box-shadow:0 8px 22px rgba(120,180,220,.22);
  z-index:1000; opacity:0; transition:opacity .3s;
  pointer-events:none; white-space:nowrap;
}
.toast.show { opacity:1; }

::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:rgba(160,200,230,.3); border-radius:2px; }
</style>
</head>

      <div class="rec-dot"></div>

      </div>
    </div>

    <div class="retake-banner" id="retakeBanner">↺ RETAKING FRAME <span id="retakeNum">1</span></div>

      <div class="pdot" id="d1"><span>2</span></div>

      <div class="pdot" id="d3"><span>4</span></div>
    </div>

      <div class="thumb-item thumb-empty" id="t0">○</div>
      <div class="thumb-item thumb-empty" id="t1">○</div>
      <div class="thumb-item thumb-empty" id="t2">○</div>
      <div class="thumb-item thumb-empty" id="t3">○</div>
    </div>

    <div class="glass panel">
      <div class="panel-row">
        <span class="panel-label">Filter</span>
        <button class="btn btn-sm btn-toggle on" id="btnFilter">⚡ ON</button>
        <span class="panel-label" style="margin-left:4px">Intensity</span>
        <input type="range" id="filterSlider" min="0" max="100" value="65">
        <span class="val-label" id="filterVal">65</span>

      <div class="panel-row">
        <span class="panel-label">Flash</span>
        <button class="btn btn-sm btn-toggle on" id="btnFlash">◈ ON</button>
        <span class="panel-label" style="margin-left:4px">Music</span>
        <button class="btn btn-sm btn-toggle on" id="btnMusic">♪ ON</button>
      </div>
      <div class="panel-row">
        <span class="panel-label">Caption</span>
        <input type="text" id="captionEl" placeholder="add your message..." maxlength="40">
      </div>
    </div>

    <div class="divider"></div>
    <button class="btn btn-primary" id="btnShoot">▶ Start Shooting</button>

        <span class="panel-label">Size</span>

// ═══════════════════════════════════════════
//  BGM — dreamy chord arpeggio
// ═══════════════════════════════════════════
let bgmCtx=null, bgmTimer=null;
function startBGM(){
  if(!S.musicOn||bgmCtx) return;
  bgmCtx = new(window.AudioContext||window.webkitAudioContext)();
  const chords=[
    [261.63,329.63,392.00,493.88],
    [220.00,261.63,329.63,440.00],
    [174.61,220.00,261.63,349.23],
    [196.00,246.94,293.66,392.00],
  ];
  const melody=[523.25,587.33,622.25,659.25,698.46,659.25];
  let ci=0,mi=0;
  function tick(){
    if(!bgmCtx||!S.musicOn) return;
    const t=bgmCtx.currentTime;
    const chord=chords[ci%chords.length]; ci++;
    chord.forEach((f,i)=>{
      const o=bgmCtx.createOscillator(), g=bgmCtx.createGain();
      const lp=bgmCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
      o.type=i===0?'sine':'triangle';
      o.frequency.value=f/2;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.035,t+0.35);
      g.gain.linearRampToValueAtTime(0.02,t+1.4);
      g.gain.linearRampToValueAtTime(0,t+2.1);
      o.connect(lp);lp.connect(g);g.connect(bgmCtx.destination);
      o.start(t);o.stop(t+2.2);
    });
    // melody note
    const mf=melody[mi%melody.length]; mi++;
    const mo=bgmCtx.createOscillator(),mg=bgmCtx.createGain();
    mo.type='sine'; mo.frequency.value=mf;
    mg.gain.setValueAtTime(0,t+0.55);
    mg.gain.linearRampToValueAtTime(0.028,t+0.78);
    mg.gain.linearRampToValueAtTime(0,t+1.9);
    mo.connect(mg);mg.connect(bgmCtx.destination);
    mo.start(t+0.55);mo.stop(t+2.0);
  }
  tick(); bgmTimer=setInterval(tick,2200);
}
function stopBGM(){
  clearInterval(bgmTimer);
  if(bgmCtx){try{bgmCtx.close();}catch(e){} bgmCtx=null;}
}

function playShutter(){
  const c=new(window.AudioContext||window.webkitAudioContext)();
  const len=c.sampleRate*.08, buf=c.createBuffer(1,len,c.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(len*.12));
  const s=c.createBufferSource(); s.buffer=buf;
  const g=c.createGain(); g.gain.value=0.65;
  s.connect(g);g.connect(c.destination);s.start();
}
function playBeep(f=660){
  const c=new(window.AudioContext||window.webkitAudioContext)();
  const o=c.createOscillator(), g=c.createGain();
  o.frequency.value=f; o.type='sine';
  g.gain.setValueAtTime(.22,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.1);
  o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+.1);
}

// ═══════════════════════════════════════════
//  FILTER
// ═══════════════════════════════════════════
function applyY2K(ctx, w, h){
  const str = S.filterStr;
  
  // 1. 밀키 톤 베이스 (Milky Tone)
  // 투명한 화이트+연한 스카이블루를 깔아서 물 빠진 파스텔 느낌을 줌
  ctx.fillStyle = `rgba(240, 248, 255, ${0.15 * str})`;
  ctx.fillRect(0, 0, w, h);

  // 2. 빛 번짐 & 소프트 포커스 (Light Bloom & Dreamy Soft Focus)
  // 사진을 복사해서 아주 흐리게(blur) 만들고, 밝게(Screen) 겹쳐 올림
  ctx.save();
  ctx.globalCompositeOperation = 'screen'; 
  ctx.globalAlpha = 0.65 * str; // 몽환적인 빛 번짐 강도
  ctx.filter = `blur(${8 * str}px) brightness(1.1)`; 
  ctx.drawImage(ctx.canvas, 0, 0, w, h);
  ctx.restore();

  // 3. 강한 디카 플래시 조명 (Strong Flash & Overexposed Highlights)
  // 한가운데(얼굴 위치)에 강한 하얀색 빛을 쏴서 하이라이트를 확 날림
  ctx.save();
  ctx.globalCompositeOperation = 'overlay';
  const flashLighting = ctx.createRadialGradient(w/2, h/2.5, 0, w/2, h/2.5, w * 0.7);
  flashLighting.addColorStop(0, `rgba(255, 255, 255, ${0.5 * str})`); // 중앙은 과노출
  flashLighting.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = flashLighting;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();

  // 4. 레트로 디카 화질 (Y2K Digital Camera Aesthetic)
  // 거친 노이즈가 아닌, 밝은 곳에서 생기는 아주 미세하고 부드러운 화이트 픽셀
  ctx.fillStyle = `rgba(255, 255, 255, ${0.08 * str})`;
  for(let i=0; i< (1000 * str); i++){
    ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
}

// ═══════════════════════════════════════════
//  PROGRESS
// ═══════════════════════════════════════════
function updateProgress(){
  for(let i=0;i<4;i++){
    const d=document.getElementById(`d${i}`);
    d.className='pdot'; d.innerHTML='';
    if(S.photos[i]) d.classList.add('done');
    else if(i===S.currentShot&&S.shooting) d.classList.add('active');
    else d.innerHTML=`<span>${i+1}</span>`;
  }
}

// ═══════════════════════════════════════════
//  THUMBS
// ═══════════════════════════════════════════
function updateThumbs(){
  for(let i=0;i<4;i++){
    const t=document.getElementById(`t${i}`);
    t.innerHTML=''; t.className='thumb-item';
    if(S.photos[i]){
      const img=document.createElement('img'); img.src=S.photos[i]; t.appendChild(img);
      const hint=document.createElement('div'); hint.className='thumb-hint';
      hint.innerHTML='↺<br>RETAKE'; t.appendChild(hint);
      // remove old listeners by cloning
      const nt=t.cloneNode(true);
      t.parentNode.replaceChild(nt,t);
      nt.querySelector('img').src=S.photos[i];
      nt.addEventListener('click',()=>startRetake(i));
    } else {
      t.classList.add('thumb-empty'); t.textContent='○';
    }
  }
}

// ═══════════════════════════════════════════
//  CAPTURE
// ═══════════════════════════════════════════
function capturePhoto(){
  const vw = video.videoWidth || 640;
  const vh = video.videoHeight || 480;

  // 찍히는 사진과 화면에 보이는 비율을 540/400으로 완벽하게 똑같이 맞춤
  const targetRatio = 540 / 400;
  const videoRatio = vw / vh;

  let cropW = vw;
  let cropH = vh;
  let startX = 0;
  let startY = 0;

  if (videoRatio > targetRatio) {
    cropW = vh * targetRatio;
    startX = (vw - cropW) / 2;
  } else {
    cropH = vw / targetRatio;
    startY = (vh - cropH) / 2;
  }

  capCanvas.width = cropW;
  capCanvas.height = cropH;

  const ctx = capCanvas.getContext('2d');
  ctx.save();
  ctx.translate(cropW, 0);
  ctx.scale(-1, 1);
  
  ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
  ctx.restore();

  if(S.filterOn) applyY2K(ctx, cropW, cropH);
  
  return capCanvas.toDataURL('image/jpeg', .93);
}

function applyY2K(ctx, w, h){
  const str = S.filterStr;
  
  // 1. 밀키 톤 베이스 (Milky Tone)
  ctx.fillStyle = `rgba(240, 248, 255, ${0.15 * str})`;
  ctx.fillRect(0, 0, w, h);

  // 2. 빛 번짐 & 소프트 포커스 (Light Bloom & Dreamy Soft Focus)
  ctx.save();
  ctx.globalCompositeOperation = 'screen'; 
  ctx.globalAlpha = 0.65 * str; // 몽환적인 빛 번짐 강도
  ctx.filter = `blur(${8 * str}px) brightness(1.1)`; 
  ctx.drawImage(ctx.canvas, 0, 0, w, h);
  ctx.restore();

  // 3. 강한 디카 플래시 조명 (Strong Flash & Overexposed Highlights)
  ctx.save();
  ctx.globalCompositeOperation = 'overlay';
  const flashLighting = ctx.createRadialGradient(w/2, h/2.5, 0, w/2, h/2.5, w * 0.7);
  flashLighting.addColorStop(0, `rgba(255, 255, 255, ${0.5 * str})`); 
  flashLighting.addColorStop(1, 'rgba(255, 255, 255, 0)');
  ctx.fillStyle = flashLighting;
  ctx.fillRect(0, 0, w, h);
  ctx.restore();

  // 4. 레트로 디카 미세 노이즈 (Y2K Digital Camera Aesthetic)
  ctx.fillStyle = `rgba(255, 255, 255, ${0.08 * str})`;
  for(let i=0; i< (1000 * str); i++){
    ctx.fillRect(Math.random()*w, Math.random()*h, 1, 1);
  }
}

function triggerFlash(){

// ═══════════════════════════════════════════
//  COUNTDOWN + SHOOT
// ═══════════════════════════════════════════
const sleep=ms=>new Promise(r=>setTimeout(r,ms));

async function countdown(n=5){
  cdOverlay.classList.add('visible');
  guideEl.textContent=GUIDES[Math.floor(Math.random()*GUIDES.length)];
  for(let i=n;i>=1;i--){
    cdNum.style.animation='none'; void cdNum.offsetHeight;
    cdNum.style.animation='cPulse 1s ease-out';
    cdNum.textContent=i;
    if(i<=3) playBeep(380+i*90);
    await sleep(1000);
  }
  cdOverlay.classList.remove('visible');
}

async function shootSequence(indices){
  S.shooting=true;
  btnShoot.disabled=true; btnShoot.textContent='● Recording...';
  shootLabel.style.display='none';

  for(const idx of indices){
    S.currentShot=idx; updateProgress();
    
    // 1. 카운트다운 진행
    await countdown(5);
    
    // 2. 사진 찍기 직전에 화면을 하얗게 만들어서 얼굴에 빛 쏘기!
    if(S.flashOn) {
      flashEl.classList.add('flash');
      await sleep(150); // 하얀 빛이 얼굴에 닿을 시간 아주 잠깐(0.15초) 기다림
    }

    // 3. 얼굴이 환해진 그 순간 찰칵! 찍기
    const url=capturePhoto();
    playShutter();

    // 4. 플래시 효과 끄기
    if(S.flashOn) {
      flashEl.classList.remove('flash');
      await sleep(80); // 눈부심 잔상 대기
    }
    
    S.photos[idx]=url; updateThumbs(); updateProgress();
    await sleep(480);
  }

  S.shooting=false; S.retakeIdx=null;
  retakeBanner.classList.remove('visible');
  btnShoot.disabled=false; btnShoot.textContent='▶ Start Shooting';
  shootLabel.style.display='';

  if(S.photos.every(p=>p!==null)){
    await sleep(280); await showResult();
  }
}
function startRetake(idx){
  if(S.shooting) return;
  S.retakeIdx=idx;
  document.getElementById('retakeNum').textContent=idx+1;
  retakeBanner.classList.add('visible');
  showScreen('camera');
  shootSequence([idx]);
}

btnShoot.addEventListener('click',()=>{
  if(S.shooting) return;
  const missing=[]; for(let i=0;i<4;i++) if(!S.photos[i]) missing.push(i);
  const toShoot=missing.length>0?missing:[0,1,2,3];
  if(missing.length===0){ S.photos=[null,null,null,null]; updateThumbs(); }
  shootSequence(toShoot);
});

// ═══════════════════════════════════════════
//  STICKER EXTRACTION
// ═══════════════════════════════════════════
let stkImgEl=null;
const stkCanvases={};

function buildStickerPreviews(){
  stkImgEl=new Image();
  stkImgEl.onload=()=>{
    const W=stkImgEl.naturalWidth, H=stkImgEl.naturalHeight;
    const scroll=document.getElementById('stickerScroll');
    STICKER_DEFS.forEach((def,idx)=>{
      const pw=Math.round(W*def.sw), ph=Math.round(H*def.sh);
      const cv=document.createElement('canvas'); cv.width=pw; cv.height=ph;
      const ctx=cv.getContext('2d');
      ctx.drawImage(stkImgEl, Math.round(W*def.sx), Math.round(H*def.sy), pw, ph, 0,0,pw,ph);

      // Remove white/near-white background
      const id=ctx.getImageData(0,0,pw,ph), dd=id.data;
      for(let i=0;i<dd.length;i+=4){
        const r=dd[i],g=dd[i+1],b=dd[i+2];
        // luminance-based white removal with smooth edge
        const lum=(r+g+b)/3;
        const sat=Math.max(r,g,b)-Math.min(r,g,b);
        // Very white (low saturation, high lum) → transparent
        if(lum>235&&sat<25){
          dd[i+3]=0;
        } else if(lum>210&&sat<40){
          // Semi-transparent edge smoothing
          const alpha=Math.round(255*(1-((lum-210)/25)));
          dd[i+3]=Math.min(dd[i+3],alpha);
        }
      }
      ctx.putImageData(id,0,0);
      stkCanvases[idx]=cv;

      const btn=document.createElement('button'); btn.className='sticker-btn';
      const thumb=document.createElement('img'); thumb.src=cv.toDataURL('image/png');
      btn.appendChild(thumb);
      btn.addEventListener('click',()=>{
        document.querySelectorAll('.sticker-btn').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        S.selectedSticker=idx;
      });
      scroll.appendChild(btn);
    });
  };
  stkImgEl.src=STICKERS_SRC;
}

// ═══════════════════════════════════════════
//  STICKER CANVAS INTERACTION
// ═══════════════════════════════════════════
stkCanvas.addEventListener('click',(e)=>{
  if(S.selectedSticker===null) return;
  const rect=stkCanvas.getBoundingClientRect();
  const scaleX=stkCanvas.width/rect.width;
  const scaleY=stkCanvas.height/rect.height;
  const x=(e.clientX-rect.left)*scaleX;
  const y=(e.clientY-rect.top)*scaleY;
  // size relative to canvas width
  const size=parseInt(stickerSize.value)*(stkCanvas.width/360);
  S.placedStickers.push({idx:S.selectedSticker,x,y,size});
  drawStickers();
});

function drawStickers(){
  const ctx=stkCanvas.getContext('2d');
  ctx.clearRect(0,0,stkCanvas.width,stkCanvas.height);
  S.placedStickers.forEach(ps=>{
    const cv=stkCanvases[ps.idx]; if(!cv) return;
    const aspect=cv.height/cv.width;
    ctx.drawImage(cv,ps.x-ps.size/2,ps.y-(ps.size*aspect)/2,ps.size,ps.size*aspect);
  });
}

btnUndo.addEventListener('click',()=>{ S.placedStickers.pop(); drawStickers(); });
btnClear.addEventListener('click',()=>{ S.placedStickers=[]; drawStickers(); });

// ═══════════════════════════════════════════
//  BUILD RESULT CANVAS
//  Spec: 600×1800, pad=30, gap=20, photo=600×400, logo top
// ═══════════════════════════════════════════
function loadImg(src){
  return new Promise((res,rej)=>{
    const i=new Image(); i.onload=()=>res(i); i.onerror=()=>rej(new Error('img load fail')); i.src=src;
  });
}

async function buildResult(){
  // Canvas dimensions
  const TW=600, TH=1800;
  const PAD=30, GAP=20;
  // Photo area: 4 photos each 600×400 (as specified)
  // But we need to fit logo + 4×400 + 3×20 + caption
  // 4×400 + 3×20 = 1660; + PAD top(30) + PAD bot(30) = 1720; leaves 80px for logo+caption
  // Better: logo=80px, photos start at y=110, caption at bottom 50px
  const LOGO_H = 80;
  const LOGO_Y = 15;
  const PHOTO_Y_START = LOGO_Y + LOGO_H + 10; // y=105
  const PHOTO_W = TW - PAD*2;                  // 540
  const PHOTO_H = 400;
  const CAPTION_Y = PHOTO_Y_START + 4*(PHOTO_H+GAP) - GAP; // after last photo
  // Total photos height: 4*400 + 3*20 = 1660; caption at y=105+1660=1765
  // TH=1800, so 35px left for caption — tight but ok

  resCanvas.width=TW; resCanvas.height=TH;
  stkCanvas.width=TW; stkCanvas.height=TH;

  const ctx=resCanvas.getContext('2d');

  // ── 1. FRAME BACKGROUND ──
  const frameImg=await loadImg(FRAME_SRC);
  ctx.drawImage(frameImg,0,0,TW,TH);

  // ── 2. LOGO ──
  const logoEl=document.getElementById('logoImg');
  const logoW=Math.round(LOGO_H*(logoEl.naturalWidth/logoEl.naturalHeight));
  ctx.drawImage(logoEl,(TW-logoW)/2,LOGO_Y,logoW,LOGO_H);

  // ── 3. PHOTOS ──
  for(let i=0;i<4;i++){
    const px=PAD;
    const py=PHOTO_Y_START + i*(PHOTO_H+GAP);

    if(S.photos[i]){
      const img=await loadImg(S.photos[i]);
      // subtle white border glow
      ctx.save();
      ctx.shadowColor='rgba(255,255,255,0.7)'; ctx.shadowBlur=10;
      ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=1.5;
      ctx.strokeRect(px,py,PHOTO_W,PHOTO_H);
      ctx.restore();
      // draw photo cropped to exact rect
      ctx.drawImage(img,px,py,PHOTO_W,PHOTO_H);
    } else {
      // empty slot
      ctx.fillStyle='rgba(180,215,240,0.25)';
      ctx.fillRect(px,py,PHOTO_W,PHOTO_H);
      ctx.fillStyle='rgba(160,200,230,0.45)';
      ctx.font='11px monospace'; ctx.textAlign='center';
      ctx.fillText('[empty]',TW/2,py+PHOTO_H/2);
    }
  }

  // ── 4. CAPTION + DATE ──
  const now=new Date(), p2=x=>String(x).padStart(2,'0');
  const dateStr=`${now.getFullYear()}.${p2(now.getMonth()+1)}.${p2(now.getDate())}`;
  const caption=S.caption.trim();

  ctx.save();
  ctx.shadowColor='rgba(255,255,255,0.9)'; ctx.shadowBlur=10;
  ctx.textAlign='center';

  if(caption){
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font='bold 14px "Space Mono",monospace';
    ctx.fillText(caption, TW/2, CAPTION_Y+18);
    ctx.fillStyle='rgba(255,255,255,0.6)';
    ctx.font='10px "Space Mono",monospace';
    ctx.fillText(dateStr, TW/2, CAPTION_Y+34);
  } else {
    ctx.fillStyle='rgba(255,255,255,0.7)';
    ctx.font='11px "Space Mono",monospace';
    ctx.fillText(dateStr, TW/2, CAPTION_Y+22);
  }
  ctx.restore();

  // ── 5. MADE BY ──
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.32)';
  ctx.font='7px "Space Mono",monospace';
  ctx.textAlign='center';
  ctx.letterSpacing='2px';
  ctx.fillText('made by byeolgom', TW/2, TH-8);
  ctx.restore();
}

// ═══════════════════════════════════════════
//  MERGED EXPORT
// ═══════════════════════════════════════════
function getMergedCanvas(){
  const out=document.createElement('canvas');
  out.width=resCanvas.width; out.height=resCanvas.height;
  const ctx=out.getContext('2d');
  ctx.drawImage(resCanvas,0,0);
  ctx.drawImage(stkCanvas,0,0);
  return out;
}

  const cv=getMergedCanvas();
  const a=document.createElement('a');
  a.download=`shining-moments-${Date.now()}.png`;
  a.href=cv.toDataURL('image/png',quality);
  a.click();
}

// Get blob helper
function getBlob(q=0.9){
  return new Promise(res=>getMergedCanvas().toBlob(res,'image/jpeg',q));
}

  if(navigator.share){
    try{
      const blob=await getBlob(.92);
      const file=new File([blob],'shining-moments.jpg',{type:'image/jpeg'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'Shining Moments ✦'});
        shareSheet.classList.remove('open');
        return;
      }
    }catch(e){}
  }
  downloadImage();
  showToast('Image saved — open Instagram to post ✦');
  shareSheet.classList.remove('open');
});
